
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patmart Sports</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Patmart Sports</h1>
        <p>Tailoring | Shoes | Uniforms | Tracksuits | T-shirt Printing</p>
        <div class="buttons">
            <a href="#products">Shop Now</a>
            <a href="https://wa.me/254726627044">Contact Us on WhatsApp</a>
        </div>
    </header>

    <section id="products" class="products">
        <h2>Our Products</h2>
        <div class="product-grid">
            <div class="product">
                <img src="images/suit1.jpg" alt="Dark Suit">
                <p>Classic Suit</p>
            </div>
            <div class="product">
                <img src="images/suit2.jpg" alt="Sky Blue Suit">
                <p>Sky Blue Suit</p>
            </div>
            <div class="product">
                <img src="images/tracksuit.jpg" alt="Tracksuit">
                <p>Custom Tracksuit</p>
            </div>
            <div class="product">
                <img src="images/uniform.jpg" alt="Uniform">
                <p>School Uniform</p>
            </div>
            <div class="product">
                <img src="images/shoes.jpg" alt="School Shoes">
                <p>School Shoes</p>
            </div>
            <div class="product">
                <img src="images/printing.jpg" alt="T-Shirt Printing">
                <p>T-Shirt Printing</p>
            </div>
        </div>
    </section>
</body>
</html>
